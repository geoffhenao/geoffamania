<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo(ff)pardy!</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7VTBFP1ZC2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7VTBFP1ZC2');
    </script>

    <style>
        /* Timer Control Adjustments */
        #timerDisplay {
            text-shadow: 0 0 10px rgba(85, 153, 255, 0.5);
        }
        button:hover {
            background: #5599ff;
            transition: background 0.2s;
        }
        input[type="number"]::-webkit-inner-spin-button {
            opacity: 1;
        }

        :root {
            --blue-jeopardy: #222;
            --yellow-jeopardy: #336699;
            --panel-bg: #222;
        }

        body {
            font-family: monospace;
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Editable Main Title Styling */
        .main-title-input {
            background: transparent;
            border: none;
            color: #336699;
            font-family: monospace;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 2px 2px 0px #000;
            letter-spacing: 2px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .main-title-input:focus {
            outline: 2px dashed #336699;
            background: rgba(255,255,255,0.05);
        }

        /* Game Layout */
        .game-container {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            max-width: 1400px;
            gap: 20px;
        }

        /* Center Layout Wrapper to Stack Board and Timer cleanly */
        .center-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 20px;
        }

        /* Score Tracker Panels */
        .player-panel {
            background-color: var(--panel-bg);
            border: 3px solid var(--blue-jeopardy);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .player-name {
            background: transparent;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .player-name:focus {
            outline: 1px solid #336699;
        }

        .score-display {
            font-size: 3.5rem;
            color: #336699;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .wager-input {
            width: 80%;
            padding: 10px;
            font-size: 1.2rem;
            text-align: center;
            font-family: monospace;
            margin-bottom: 15px;
            background: #333;
            color: white;
            border: 2px solid #555;
            border-radius: 4px;
        }

        .wager-input:focus {
            outline: none;
            border-color: #336699;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        .score-btn {
            flex: 1;
            padding: 10px 5px;
            font-family: monospace;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            text-transform: uppercase;
            transition: opacity 0.2s;
            font-weight: bold;
        }

        .score-btn:hover {
            opacity: 0.8;
        }

        .btn-add { background-color: #336699; color: white; }
        .btn-sub { background-color: #ff0000; color: white; }
        
        .btn-skip {
            background-color: #555;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: opacity 0.4s ease, background-color 0.2s;
        }
        .btn-skip:hover {
            background-color: #777;
        }
        .btn-skip svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Generic Modifier Panel Layout (Bonus & Curse) */
        .modifier-panel {
            background-color: var(--panel-bg);
            border: 3px solid var(--blue-jeopardy);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-top: 15px;
            cursor: pointer;
            transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.1s ease;
            box-sizing: border-box;
        }
        
        .modifier-panel:active {
            transform: scale(0.98);
        }

        /* Binterman Blue Glow effect when active */
        .modifier-panel.bonus-active {
            border-color: #5599ff;
            box-shadow: 0 0 25px rgba(85, 153, 255, 0.8), 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Ngiam Red Glow effect when active */
        .modifier-panel.curse-active {
            border-color: #ff3333;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8), 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Editable Modifier Title Input */
        .modifier-title-input {
            background: transparent;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 12px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: text;
        }

        .modifier-title-input:focus {
            outline: 1px dashed #336699;
            background: rgba(255,255,255,0.05);
        }

        .modifier-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid #333;
            background: #111;
            pointer-events: none;
        }

        /* Board Styles */
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .category-header {
            background-color: var(--blue-jeopardy);
            border: 3px solid white;
            padding: 0;
            min-height: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .category-textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 0.95rem;
            text-align: center;
            text-transform: uppercase;
            box-sizing: border-box;
            padding: 12px 5px;
            resize: none;
            overflow: hidden;
            font-weight: bold;
        }

        .category-textarea:focus {
            outline: 2px dashed #336699;
            background: rgba(0,0,0,0.3);
        }

        .cell {
            background-color: var(--blue-jeopardy);
            border: 3px solid white;
            aspect-ratio: 4/3;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .cell:hover {
            transform: scale(1.02);
            border-color: #ff0000;
        }

        .cell.disabled {
            background-color: #222;
            border-color: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        .cell.disabled input {
            color: #555;
            cursor: not-allowed;
            text-shadow: none;
        }

        .cell input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: monospace;
            font-size: 1.8rem;
            text-align: center;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-sizing: border-box;
            font-weight: bold;
        }

        /* Widget Box for the Timer */
        .info-box {
            background: #222;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid #336699;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: calc(100% - 38px);
        }

        .info-box h2 {
            margin: 0 0 5px 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #336699;
        }

        .timer-controls input,
        .timer-controls button {
            font-family: monospace;
        }

        /* Modal Popup styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: var(--blue-jeopardy);
            border: 5px solid white;
            padding: 40px;
            width: 80%;
            max-width: 700px;
            text-align: center;
            box-shadow: 0px 0px 30px rgba(241, 196, 15, 0.4);
        }

        .modal-question {
            font-size: 2.5rem;
            margin-bottom: 30px;
            line-height: 1.4;
            text-shadow: 2px 2px 0px #000;
        }

        .close-btn {
            background: var(--yellow-jeopardy);
            color: black;
            border: none;
            padding: 10px 25px;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        .close-btn:hover {
            background: white;
        }
    </style>
</head>
<body>

    <input type="text" class="main-title-input" value="GEO(FF)PARDY!">

    <div class="game-container">
        
        <div style="display: flex; flex-direction: column;">
            <div class="player-panel">
                <input type="text" class="player-name" value="PLAYER 1">
                <div class="score-display" id="score-p1">750</div>
                <input type="number" class="wager-input" id="wager-p1" placeholder="Enter Wager">
                <div class="btn-group">
                    <button class="score-btn btn-add" onclick="updateScore('p1', true)">Win</button>
                    <button class="score-btn btn-sub" onclick="updateScore('p1', false)">Loss</button>
                    <button class="score-btn btn-skip" onclick="document.getElementById('wager-p1').value=''; this.style.opacity='0'; this.style.pointerEvents='none';">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>Skip
                    </button>
                </div>
            </div>

            <div class="modifier-panel" id="bonus-panel-p1" onclick="toggleBonusGlow(this)">
                <input type="text" class="modifier-title-input" value="BINTERMAN BONUS" onclick="event.stopPropagation();">
                <img class="modifier-image" src="https://geoffhenao.github.io/geoffamania/8-bit-binterman-T.png" alt="P1 Bonus">
            </div>

            <div class="modifier-panel" id="curse-panel-p1" onclick="toggleCurseGlow(this)">
                <input type="text" class="modifier-title-input" value="NGIAM CURSE" onclick="event.stopPropagation();">
                <img class="modifier-image" src="https://placehold.co/200x200/222/ff3333?text=Ngiam" alt="P1 Curse">
            </div>
        </div>

        <div class="center-column">
            <div class="board" id="game-board"></div>

            <div class="info-box">
                <h2>Timer</h2>
                <div id="timerDisplay" style="font-size: 40px; text-align: center; color: #5599ff; font-weight: bold; margin: 10px 0; font-family: monospace;">0</div>
                <div class="timer-controls" style="display: flex; gap: 5px;">
                    <input type="number" id="timerInput" value="30" min="1" max="60" style="background: #000; color: white; border: 1px solid #336699; width: 60px; padding: 5px; text-align: center; font-size: 1rem;">
                    <button onclick="startTimer()" style="background: #336699; color: white; border: none; padding: 5px 10px; cursor: pointer; width: 80px;">Start</button>
                    <button onclick="stopTimer()" style="background: #336699; color: white; border: none; padding: 5px 10px; cursor: pointer; width: 80px;">Stop</button>
                </div>
            </div>
        </div>
            
        <div style="display: flex; flex-direction: column;">
            <div class="player-panel">
                <input type="text" class="player-name" value="PLAYER 2">
                <div class="score-display" id="score-p2">750</div>
                <input type="number" class="wager-input" id="wager-p2" placeholder="Enter Wager">
                <div class="btn-group">
                    <button class="score-btn btn-add" onclick="updateScore('p2', true)">Win</button>
                    <button class="score-btn btn-sub" onclick="updateScore('p2', false)">Loss</button>
                    <button class="score-btn btn-skip" onclick="document.getElementById('wager-p2').value=''; this.style.opacity='0'; this.style.pointerEvents='none';">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>Skip
                    </button>
                </div>
            </div>

            <div class="modifier-panel" id="bonus-panel-p2" onclick="toggleBonusGlow(this)">
                <input type="text" class="modifier-title-input" value="BINTERMAN BONUS" onclick="event.stopPropagation();">
                <img class="modifier-image" src="https://geoffhenao.github.io/geoffamania/8-bit-binterman-T.png" alt="P2 Bonus">
            </div>

            <div class="modifier-panel" id="curse-panel-p2" onclick="toggleCurseGlow(this)">
                <input type="text" class="modifier-title-input" value="NGIAM CURSE" onclick="event.stopPropagation();">
                <img class="modifier-image" src="https://placehold.co/200x200/222/ff3333?text=Ngiam" alt="P2 Curse">
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-question" id="modal-text">Loading question...</div>
            <button class="close-btn" onclick="closeModal()">Close Window</button>
        </div>
    </div>

    <script>
        // 1. DATA MAPPING
        const gameData = {
            categories: ["Category 1", "Category 2", "Category 3", "Category 4"],
            questions: {
                "Category 1": {
                    "Easy": "This 'Cleaner' won the inaugural IWGP United States Championship.",
                    "Medium": "He was known as 'La Sombra' in CMLL before signing with WWE.",
                    "Hard": "Name the stable founded by Rush in CMLL that later expanded to Japan as Los Ingobernables de Japón."
                },
                "Category 2": {
                    "Easy": "This Nintendo hybrid console lets you play on the TV or on the go.",
                    "Medium": "In God of War (2018), this is the true giant name of Atreus' mother, Laufey.",
                    "Hard": "This Ubisoft platforming mascot debuted in 1995 without any limbs."
                },
                "Category 3": {
                    "Easy": "This Chicago establishment is famous for its Swedish pancakes and lingonberries.",
                    "Medium": "This Korean fried chicken chain is famous for its signature Soy Garlic and Spicy glazes.",
                    "Hard": "This historic cash-only counter in Chicago is legendary for its Korean-American breakfasts like kimchi bacon fried rice."
                },
                "Category 4": {
                    "Easy": "What is the starting bank total for a standard game of Ge(off)pardy?",
                    "Medium": "True or False: A Binterman Bonus can be applied to a Whammy penalty.",
                    "Hard": "When must a player declare they are using a Binterman Bonus?"
                }
            }
        };

        const difficulties = ["Easy", "Medium", "Hard"];
        const defaultValues = { "Easy": "100/300", "Medium": "200/400", "Hard": "300/500" };

        const board = document.getElementById('game-board');
        let activeCell = null;

        // Player Scores State
        let scores = {
            p1: 750,
            p2: 750
        };

        // 2. BUILD THE BOARD
        function initBoard() {
            gameData.categories.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'category-header';
                
                const textarea = document.createElement('textarea');
                textarea.className = 'category-textarea';
                textarea.value = cat;
                
                header.appendChild(textarea);
                board.appendChild(header);
            });

            difficulties.forEach(diff => {
                gameData.categories.forEach((cat, index) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = defaultValues[diff];
                    
                    input.style.pointerEvents = "none"; 

                    cell.addEventListener('click', () => {
                        if (cell.classList.contains('disabled')) return;
                        const currentCatName = document.querySelectorAll('.category-textarea')[index].value.trim();
                        launchQuestion(currentCatName, diff, cell);
                    });

                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault(); 
                        if (cell.classList.contains('disabled')) {
                            cell.classList.remove('disabled');
                            input.disabled = false;
                        } else {
                            input.style.pointerEvents = "auto"; 
                            input.focus();
                            input.select(); 
                        }
                    });

                    input.addEventListener('blur', () => {
                        input.style.pointerEvents = "none";
                    });

                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            input.blur();
                        }
                    });

                    cell.appendChild(input);
                    board.appendChild(cell);
                });
            });
        }

        // 3. INTERACTION LOGIC
        function launchQuestion(category, difficulty, cellElement) {
            const lookupKey = gameData.questions[category] ? category : Object.keys(gameData.questions)[Array.from(document.querySelectorAll('.category-textarea')).findIndex(el => el.value.trim() === category)];
            const question = gameData.questions[lookupKey] ? gameData.questions[lookupKey][difficulty] : "No question loaded for this custom category.";
            
            document.getElementById('modal-text').innerText = question;
            document.getElementById('modal').style.display = 'flex';
            activeCell = cellElement;
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if (activeCell) {
                activeCell.classList.add('disabled');
                activeCell.querySelector('input').disabled = true;
                activeCell = null;
            }
            
            // Bring the skip buttons back for the next round
            document.querySelectorAll('.btn-skip').forEach(btn => {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            });
        }

        // 4. SCORE TRACKING LOGIC (With Binterman Insured Losses and Ngiam Cursed Wins)
        function updateScore(player, isAdd) {
            const wagerInput = document.getElementById(`wager-${player}`);
            const wagerValue = parseInt(wagerInput.value) || 0;
            
            const bonusPanel = document.getElementById(`bonus-panel-${player}`);
            const cursePanel = document.getElementById(`curse-panel-${player}`);
            
            const isBonusActive = bonusPanel && bonusPanel.classList.contains('bonus-active');
            const isCurseActive = cursePanel && cursePanel.classList.contains('curse-active');
            
            if (isAdd) {
                if (isCurseActive) {
                    // Ngiam Curse halves the win amount
                    scores[player] += Math.round(wagerValue / 2);
                    cursePanel.classList.remove('curse-active');
                } else {
                    // Standard win
                    scores[player] += wagerValue;
                }
            } else {
                if (isBonusActive) {
                    // Binterman Bonus halves the loss amount
                    scores[player] -= Math.round(wagerValue / 2);
                    bonusPanel.classList.remove('bonus-active');
                } else {
                    // Standard loss (Still fully penalized under Ngiam curse or normal state)
                    scores[player] -= wagerValue;
                }
                
                // Clear the curse modifier if active on a loss round as well
                if (isCurseActive) cursePanel.classList.remove('curse-active');
            }

            document.getElementById(`score-${player}`).innerText = scores[player];
            wagerInput.value = '';
        }

        // Run on load
        initBoard();

        // 5. TIMER LOGIC
        let countdown; 

        function startTimer() {
            clearInterval(countdown); 
            let seconds = parseInt(document.getElementById("timerInput").value);
            
            if (isNaN(seconds) || seconds < 1) seconds = 30;
            
            const display = document.getElementById("timerDisplay");
            display.innerText = seconds;
            
            countdown = setInterval(() => {
                seconds--;
                display.innerText = seconds;
                
                if (seconds <= 0) {
                    clearInterval(countdown);
                    display.innerText = "0";
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(countdown);
        }

        // 6. MODIFIER TOGGLE LOGIC
        function toggleBonusGlow(panelElement) {
            panelElement.classList.toggle('bonus-active');
        }

        function toggleCurseGlow(panelElement) {
            panelElement.classList.toggle('curse-active');
        }
    </script>
</body>
</html>
