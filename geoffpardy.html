<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo(ff)pardy!</title>

    <style>
        @keyframes neonPulse {
    0% {
        box-shadow: 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.6)), inset 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.4));
        border-color: var(--glow-dim, #336699);
    }
    50% {
        box-shadow: 0 0 20px var(--glow-bright, rgba(51, 102, 153, 0.9)), inset 0 0 15px var(--glow-bright, rgba(51, 102, 153, 0.6));
        border-color: var(--glow-bright, #5599ff);
    }
    100% {
        box-shadow: 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.6)), inset 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.4));
        border-color: var(--glow-dim, #336699);
    }
}

.special-space {
    animation: neonPulse 2s infinite ease-in-out;
    background: var(--glow-bg, rgba(51, 102, 153, 0.15)) !important;
    z-index: 5;
}
/* Keeps the player panels dark even when the shift-click glow is active */
.player-panel.special-space {
    background: var(--panel-bg) !important;
    box-shadow: 0 0 35px var(--glow-bright, rgba(51, 102, 153, 1)), 
                inset 0 0 25px var(--glow-bright, rgba(51, 102, 153, 1)) !important;
}
}
/* Forces cells to maintain a dark base color under the translucent glow */
.cell.special-space {
    background-color: var(--blue-jeopardy) !important; /* Your solid dark blue/gray board color */
    background-image: linear-gradient(var(--glow-bg, rgba(51, 102, 153, 0.15)), var(--glow-bg, rgba(51, 102, 153, 0.15))) !important;
}
        /* Force padding and borders to calculate inside widths */
        * {
            box-sizing: border-box;
        }

        /* Timer Control Adjustments */
        #timerDisplay {
            text-shadow: 0 0 10px rgba(85, 153, 255, 0.5);
        }
        button:hover {
            background: #5599ff;
            transition: background 0.2s;
        }
        input[type="number"]::-webkit-inner-spin-button {
            opacity: 1;
        }

        :root {
            --blue-jeopardy: #222;
            --yellow-jeopardy: #336699;
            --panel-bg: #222;
        }

        body {
            font-family: monospace;
            background-color: #ffffff;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Editable Main Title Styling */
        .main-title-input {
            background: transparent;
            border: none;
            color: #336699;
            font-family: monospace;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 2px 2px 0px #000;
            letter-spacing: 2px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Game Layout */
        .game-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch; /* Forces all columns (sides and center) to be the exact same height on desktop */
            width: 100%;
            max-width: 2000px; 
            gap: 30px; 
        }

        /* Side Wrapper for Player Content */
        .player-side {
            display: flex;
            flex-direction: column;
            gap: 0px;
            flex-shrink: 0; 
        }

        /* Center Layout Wrapper to Stack Board and Timer cleanly */
        .center-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            max-width: 1000px; 
            gap: 20px;
            min-width: 0; 
            margin-top: -9px;
            box-shadow: 0 -4px -15px rgba(0,0,0,0.5);
        }

        /* Score Tracker Panels */
        .player-panel {
            background-color: var(--panel-bg);
            border: 3px solid var(--blue-jeopardy);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            -webkit-user-select: none; /* Safari */
    -ms-user-select: none;     /* IE 10 and Edge */
    user-select: none;         /* Standard syntax */
        }

        .player-name {
            background: transparent;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .player-name:focus {
            outline: 1px solid #336699;
        }

        .score-display {
            font-size: 3.5rem;
            color: #336699;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .wager-input {
            width: 80%;
            padding: 10px;
            font-size: 1.2rem;
            text-align: center;
            font-family: monospace;
            margin-bottom: 15px;
            background: #333;
            color: white;
            border: 2px solid #555;
            border-radius: 4px;
        }

        .wager-input:focus {
            outline: none;
            border-color: #336699;
        }
/* For Chrome, Safari, Edge, and Opera */
.wager-input::-webkit-outer-spin-button,
.wager-input::-webkit-inner-spin-button,
#timerInput::-webkit-outer-spin-button,
#timerInput::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* For Firefox */
.wager-input[type="number"],
#timerInput[type="number"] {
    -moz-appearance: textfield;
}

        .btn-group {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        .score-btn {
            flex: 1;
            padding: 10px 5px;
            font-family: monospace;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            text-transform: uppercase;
            transition: opacity 0.2s, background-color 0.2s;
            font-weight: bold;
        }
.btn-sub:hover {
    background: #ff3333; /* A slightly brighter red for the hover state */
}
        .score-btn:hover {
            opacity: 0.8;
        }

        .btn-add { background-color: #336699; color: white; }
        .btn-sub { background-color: #ff0000; color: white; }
        .btn-sub:hover { background-color: #ff3333; }
        
        .btn-skip {
            background-color: #555;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: opacity 0.3s ease, background-color 0.2s;
        }
        .btn-skip:hover {
            background-color: #777;
        }
        .btn-skip.dimmed {
            opacity: 0.25 !important;
        }
        .btn-skip svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Generic Modifier Panel Layout (Bonus & Curse) */
        .modifier-panel {
            background-color: var(--panel-bg);
            border: 3px solid var(--blue-jeopardy);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-top: 15px;
            cursor: pointer;
            transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.1s ease;
        }
        
        .modifier-panel:active {
            transform: scale(0.98);
        }

        /* Binterman Blue Glow effect when active */
        .modifier-panel.bonus-active {
            border-color: #5599ff;
            box-shadow: 0 0 25px rgba(85, 153, 255, 0.8), 0 4px 15px rgba(0,0,0,1);
        }

        /* Ngiam Red Glow effect when active */
        .modifier-panel.curse-active {
            border-color: #ff3333;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8), 0 4px 15px rgba(0,0,0,1);
        }

        /* Editable Modifier Title Input */
        .modifier-title-input {
            background: transparent;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 12px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .modifier-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid #333;
            background: #111;
            pointer-events: none;
        }

        /* Scroll container for responsive board protection */
        .board-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden; /* Hard locks unwanted height glitches */
            -webkit-overflow-scrolling: touch;
            padding: 10px 0; /* Vertical breathing room */
        }

        /* Board Styles */
        .board {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* Change number to increase number of categories */
            gap: 16px;
            width: calc(100% - 20px); /* Factors calculation buffer around structural dimensions */
            margin: 0 auto;
            min-width: 620px;
            padding: 12px; /* Generous glow safe-zone spacing buffer */
            background-color: #222222;
            border-radius: 5px;
        }

        .category-header {
            background-color: var(--blue-jeopardy);
            border: 3px solid white;
            padding: 5px;
            min-height: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .category-editable {
            width: 100%;
            color: white;
            font-family: monospace;
            font-size: 1.1rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            line-height: 1.3;
            word-wrap: break-word;
            outline: none;
        }

        .cell {
            background-color: var(--blue-jeopardy);
            border: 3px solid white;
            aspect-ratio: 4/3;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            -webkit-user-select: none; /* Safari */
    -ms-user-select: none;     /* IE 10 and Edge */
    user-select: none;         /* Standard syntax */
        }

        .cell:hover {
            transform: scale(1.04); /* Adjusted slightly for crisp hover visibility */
            border-color: #ffffff;
            z-index: 5; /* Ensures edge cells break visual stacking cleanly without triggering boxes */
        }

        .cell.disabled {
            background-color: #222;
            border-color: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        .cell.disabled:hover {
            transform: none;
            border-color: #444;
        }

        .cell.disabled input {
            color: #555;
            cursor: not-allowed;
            text-shadow: none;
        }

        .cell input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: monospace;
            font-size: 1.8rem;
            text-align: center;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            font-weight: bold;
        }

        /* Widget Box for the Timer */
        .info-box {
            background: #222;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #336699;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: calc(100% - 24px); /* Perfectly alignments with the inner boundaries of your grid padding layout */
            margin: 0 auto;
        }

        .info-box h2 {
            margin: 0 0 5px 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #336699;
        }

        /* Completely Blank Drag & Drop Zone Layout */
        .drag-drop-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: calc(100% - 24px);
            flex: 1; /* Instructs layout engine to take up all remaining space down to matching line bounds */
            min-height: 100px;
            margin: 0 auto;
            border: 2px dashed transparent; /* Stays completely invisible until dragover */
            border-radius: 6px;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        /* Flashes visual target boundaries cleanly only during a live mouse hover drag */
        .drag-drop-zone.dragover {
            border-color: #336699;
            background-color: rgba(51, 102, 153, 0.05);
        }

        .banner-preview {
            max-width: 100%;
            height: 100%; /* Spans full dynamic height of drop zone boundaries */
            max-height: 190px;
            object-fit: contain;
            border-radius: 4px;
            display: none;
        }

        .timer-controls input,
        .timer-controls button {
            font-family: monospace;
        }

        /* Modal Popup styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .modal-content {
            background: var(--blue-jeopardy);
            border: 5px solid white;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            box-shadow: 0px 0px 30px rgba(241, 196, 15, 0.4);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-question {
            font-size: 2.2rem;
            margin-bottom: 30px;
            line-height: 1.4;
            text-shadow: 2px 2px 0px #000;
        }

        .close-btn {
            background: var(--yellow-jeopardy);
            color: black;
            border: none;
            padding: 10px 25px;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin: 5px;
        }

        .close-btn:hover {
            background: white;
        }

        #header-container img {
            max-width: 100%;
            height: auto;
        }

        /* ========================================== */
        /* RESPONSIVE MEDIA QUERIES          */
        /* ========================================== */
        
        /* Tablets (iPad) and smaller laptops */
        @media (max-width: 1200px) {
            .game-container {
                flex-direction: column;
                align-items: center;
                gap: 25px;
            }

            .player-side {
                flex-direction: row;
                justify-content: center;
                align-items: flex-start;
                width: 100%;
                gap: 15px;
            }

            .modifier-panel {
                margin-top: 0;
                width: 220px;
                padding: 10px;
            }
            
            .player-panel {
                width: 220px;
                height: 255px;
                padding: 15px;
            }

            .score-display {
                font-size: 2.8rem;
                margin-bottom: 10px;
            }

            .center-column {
                width: 100%;
                max-width: 900px;
            }
        }

        /* Mobile phones */
        @media (max-width: 680px) {
            body {
                padding: 10px;
            }

            .main-title-input {
                font-size: 1.8rem;
                margin-bottom: 10px;
            }

            .player-side {
                flex-direction: column;
                align-items: center;
                width: 100%;
                gap: 10px;
            }

            .player-panel, .modifier-panel {
                width: 100%;
                max-width: 300px;
            }

            .modifier-panel {
                display: grid;
                grid-template-columns: 1fr 60px;
                gap: 10px;
                align-items: center;
                text-align: left;
            }

            .modifier-title-input {
                margin-bottom: 0;
                text-align: left;
                font-size: 1rem;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-question {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div id="header-container" style="text-align: center;">
    <img src="https://geoffhenao.github.io/geoffamania/geoffamania-logo-x.GIF" alt="Geoffamania" style="max-width: 600px; margin-bottom: 10px;">
</div>
    <div class="main-title-input">GEO(FF)PARDY!</div>
    <button class="close-btn" onclick="openRules()">View Rules</button>
<br>
    <div class="game-container">
        
        <div class="player-side">
            <div class="player-panel">
                <input type="text" class="player-name" value="PLAYER 1">
                <div class="score-display" id="score-p1">1000</div>
                <input type="number" class="wager-input" id="wager-p1" placeholder="Enter Wager">
                <div class="btn-group">
                    <button class="score-btn btn-add" onclick="updateScore('p1', true)">Win</button>
                    <button class="score-btn btn-sub" onclick="updateScore('p1', false)">Loss</button>
                    <button class="score-btn btn-skip" onclick="toggleSkipButton(this, 'wager-p1')">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>Skip
                    </button>
                </div>
            </div>

            <div class="modifier-panel" id="bonus-panel-p1" onclick="toggleBonusGlow(this)">
                <div class="modifier-title-input">BINTERMAN BONUS</div>
                <img class="modifier-image" src="https://geoffhenao.github.io/geoffamania/8-bit-binterman-T.png" alt="P1 Bonus">
            </div>

            <div class="modifier-panel" id="curse-panel-p1" onclick="toggleCurseGlow(this)">
                <div class="modifier-title-input">NGIAM CURSE</div>
                <img class="modifier-image" src="https://geoffhenao.github.io/geoffamania/geoff-by-profbanzi-ryo.PNG" alt="P1 Curse">
            </div>
        </div>

        <div class="center-column">
            <div class="board-scroll-wrapper">
                <div class="board" id="game-board"></div>
            </div>

            <div class="info-box">
                <h2>Timer</h2>
                <div id="timerDisplay" style="font-size: 40px; text-align: center; color: #5599ff; font-weight: bold; margin: 10px 0; font-family: monospace;">30</div>
                <div class="timer-controls" style="display: flex; gap: 5px;">
                    <input type="number" id="timerInput" value="30" min="1" max="60" style="background: #000; color: white; border: 1px solid #336699; width: 60px; padding: 5px; text-align: center; font-size: 1rem;">
                    <button onclick="startTimer()" style="background: #336699; color: white; border: none; padding: 5px 10px; pointer: cursor; font-family: monospace; width: 80px;">START</button>
                    <button onclick="stopTimer()" style="background: #336699; color: white; border: none; padding: 5px 10px; pointer: cursor; font-family: monospace; width: 80px;">STOP</button>

                <div class="btn-group">
                    <button class="score-btn btn-add" onclick="updateScore('p2', true)">Win</button>
                    <button class="score-btn btn-sub" onclick="updateScore('p2', false)">Loss</button>
                    <button class="score-btn btn-skip" onclick="toggleSkipButton(this, 'wager-p2')">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>Skip
                    </button>

            <div class="modifier-panel" id="bonus-panel-p2" onclick="toggleBonusGlow(this)">

            </div>

            <div class="modifier-panel" id="curse-panel-p2" onclick="toggleCurseGlow(this)">
                <div class="modifier-title-input">NGIAM CURSE</div>

    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-question" id="modal-text">Loading question...</div>
            <button class="close-btn" onclick="closeModal()">Close Window</button><br>
        </div>
    </div>

    <div class="modal-overlay" id="rules-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeRules()">Close Rules</button>
            <div id="rules-text" style="margin-top: 30px; text-align: left; line-height: 1.6; font-size: 1.2rem;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="endgame-modal">
        <div class="modal-content" style="box-shadow: 0px 0px 35px rgba(255, 0, 0, 0.5);">
            <div class="modal-question" id="endgame-text" style="font-size: 2rem; white-space: pre-line;"></div>
            <button class="close-btn" onclick="document.getElementById('endgame-modal').style.display='none';">Dismiss</button><br>
        </div>
    </div>

    <script>
        // 1. DATA STATE
        let allGameData = [];
        let scores = { p1: 1000, p2: 1000 };
        let activeCell = null;
        let clearedQuestionsCount = 0; 

        // Map for Point Values
        const pointMap = { "Easy": "EASY", "Medium": "MEDIUM", "Hard": "HARD" };

        // 2. LOAD DATA FROM GOOGLE SHEET
        function loadGameData() {
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbhFuSdU-gISkGnD1PO5RbSKGbvOyTTL88VBfjP2aNmaaGeNbqrNgv0GIvVeqBqwpK_w7pfn1GQa5J/pub?gid=0&single=true&output=csv";
            
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allGameData = results.data;
                    initBoard(); 
                }
            });
        }

        // 3. BUILD THE BOARD
        function initBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = ""; 
            
            const categories = [...new Set(allGameData.map(r => r.Category))].filter(c => c);

            // Build Headers
            categories.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<div class="category-editable" contenteditable="false">${cat}</div>`;
                board.appendChild(header);
            });

            // Configuration array for dynamic multi-color shifts
            const glowStates = [
                { dim: "", bright: "", bg: "" },                                                // State 0: None
                { dim: "#336699", bright: "#5599ff", bg: "rgba(51, 102, 153, 0.15)" },          // State 1: Blue
                { dim: "#990000", bright: "#ff0000", bg: "rgba(255, 0, 0, 0.15)" },             // State 2: Red
                { dim: "#009900", bright: "#00ff00", bg: "rgba(0, 255, 0, 0.15)" }              // State 3: Green
            ];

            // Build Cells
            ["Easy", "Medium", "Hard"].forEach(diff => {
                categories.forEach(cat => {
                    const row = allGameData.find(r => r.Category === cat && r.Difficulty === diff);
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    let colorState = 0;

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = pointMap[diff] || diff; 
                    input.style.pointerEvents = "none";
                    
                    cell.onclick = (e) => {
                        if (e.shiftKey) {
                            e.preventDefault();
                            colorState = (colorState + 1) % 4;
                            
                            if (colorState === 0) {
                                cell.classList.remove("special-space");
                                cell.style.removeProperty("--glow-dim");
                                cell.style.removeProperty("--glow-bright");
                                cell.style.removeProperty("--glow-bg");
                            } else {
                                cell.classList.add("special-space");
                                cell.style.setProperty("--glow-dim", glowStates[colorState].dim);
                                cell.style.setProperty("--glow-bright", glowStates[colorState].bright);
                                cell.style.setProperty("--glow-bg", glowStates[colorState].bg);
                            }
                            return; 
                        }

                        if (cell.classList.contains('disabled')) return;
                        launchQuestion(row, cell);
                    };

                    cell.oncontextmenu = (e) => {
                        e.preventDefault();
                        cell.classList.remove('disabled');
                        cell.classList.remove("special-space"); 
                        colorState = 0;
                        cell.style.removeProperty("--glow-dim");
                        cell.style.removeProperty("--glow-bright");
                        cell.style.removeProperty("--glow-bg");
                        input.disabled = false;
                    };
                    
                    cell.appendChild(input);
                    board.appendChild(cell);
                });
            });
        }

        // 4. QUESTION LOGIC
        function launchQuestion(row, cellElement) {
            if (!row) return;
            const modal = document.getElementById('modal');
            const textDisplay = document.getElementById('modal-text');
            const modalContent = document.querySelector('.modal-content');
            
            document.querySelectorAll('.dynamic-content').forEach(el => el.remove());

            const parser = new DOMParser();
            const decodedDoc = parser.parseFromString(row.Question, 'text/html');
            const decodedString = decodedDoc.body.textContent || decodedDoc.body.innerHTML;

            textDisplay.innerHTML = decodedString;
            
            if (row.ImageURL && row.ImageURL.trim() !== "") {
                const img = document.createElement('img');
                img.src = row.ImageURL;
                img.className = 'dynamic-content';
                img.style.maxWidth = "100%";
                img.style.marginTop = "20px";
                img.style.borderRadius = "4px";
                modalContent.appendChild(img);
            }

            const btn = document.createElement('button');
            btn.innerHTML = "Reveal Answer";
            btn.className = "close-btn dynamic-content";
            btn.style.marginTop = "20px";
            btn.onclick = () => {
                stopTimer(); 
                
                if (row.ImageURL2 && row.ImageURL2.trim() !== "") {
                    const img2 = document.createElement('img');
                    img2.src = row.ImageURL2;
                    img2.className = 'dynamic-content';
                    img2.style.maxWidth = "100%";
                    img2.style.marginTop = "20px";
                    img2.style.borderRadius = "4px";
                    modalContent.appendChild(img2);
                }

                const ans = document.createElement('div');
                ans.className = 'dynamic-content';
                ans.style.marginTop = "15px";
                ans.style.fontSize = "1.5rem";
                ans.style.color = "#ffffff";
                ans.innerHTML = "" + row.Answer;
                modalContent.appendChild(ans);
                
                btn.remove();
            };
            modalContent.appendChild(btn);

            modal.style.display = 'flex';
            activeCell = cellElement;

            startTimer(); 
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            stopTimer(); 
            if (activeCell) {
                if (!activeCell.classList.contains('disabled')) {
                    clearedQuestionsCount++;
                }
                activeCell.classList.add('disabled');
                activeCell = null;
            }
        }

        // 5. SCORE TRACKING AND CUSTOM MODAL END TRIGGERS
        function updateScore(p, add) {
            const w = parseInt(document.getElementById(`wager-${p}`).value) || 0;
            const b = document.getElementById(`bonus-panel-${p}`).classList.contains('bonus-active');
            const c = document.getElementById(`curse-panel-${p}`).classList.contains('curse-active');
            if(add) scores[p] += c ? Math.round(w/2) : w;
            else scores[p] -= b ? Math.round(w/2) : w;
            
            document.getElementById(`score-${p}`).innerText = scores[p];
            document.getElementById(`wager-${p}`).value = '';

            const p1Name = document.querySelectorAll('.player-name')[0].value.trim() || "PLAYER 1";
            const p2Name = document.querySelectorAll('.player-name')[1].value.trim() || "PLAYER 2";

            // --- END GAME TRIGGER 1: BANKRUPTCY ---
            if (scores[p] <= 0) {
                stopTimer();
                const loserName = (p === 'p1') ? p1Name : p2Name;
                const winnerName = (p === 'p1') ? p2Name : p1Name;

                triggerEndGameModal(`${loserName} just got GEOFF’D!\n\n${winnerName} is the Geo(ff)pardy Champion!`);
                return; 
            }

            // --- END GAME TRIGGER 2: ALL 18 QUESTIONS CLEARED ---
            if (clearedQuestionsCount >= 18) {
                stopTimer();
                if (scores.p1 > scores.p2) {
                    triggerEndGameModal(`All questions have been cleared!\n\n${p1Name} finishes with ${scores.p1} points and is the Geo(ff)pardy Champion!`);
                } else if (scores.p2 > scores.p1) {
                    triggerEndGameModal(`All questions have been cleared!\n\n${p2Name} finishes with ${scores.p2} points and is the Geo(ff)pardy Champion!`);
                } else {
                    triggerEndGameModal(`All questions have been cleared!\n\nIt's a TIE! ${p1Name} and ${p2Name} finished with ${scores.p1} points!`);
                }
            }
        }

        function triggerEndGameModal(messageText) {
            document.getElementById('endgame-text').innerText = messageText;
            document.getElementById('endgame-modal').style.display = 'flex';
        }

        // 6. TOGGLE SKIP BUTTON DIM ENGINE
        function toggleSkipButton(buttonElement, wagerInputId) {
            document.getElementById(wagerInputId).value = '';
            buttonElement.classList.toggle('dimmed');
        }

        // 7. TIMER ENGINE CONTROLS
        let countdown;
        function startTimer() {
            document.getElementById("alarm-sound-countdown").volume = 0.2;
            document.getElementById("alarm-sound-end").volume = 0.2;

            clearInterval(countdown);
            
            let s = parseInt(document.getElementById("timerInput").value) || 30;
            const display = document.getElementById("timerDisplay");
            
            display.innerText = s;
            
            countdown = setInterval(() => {
                s--;
                display.innerText = s;
                if(s === 12) document.getElementById("alarm-sound-countdown").play();
                if(s <= 0) { clearInterval(countdown); document.getElementById("alarm-sound-end").play(); }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(countdown);
            document.getElementById("alarm-sound-countdown").pause();
            document.getElementById("alarm-sound-end").pause();
        }

        function toggleBonusGlow(el) { el.classList.toggle('bonus-active'); }
        function toggleCurseGlow(el) { el.classList.toggle('curse-active'); }

        // 8. PURE DRAG AND DROP HANDLING LOGIC
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('dropZone').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('dropZone').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            const zone = document.getElementById('dropZone');
            zone.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            const preview = document.getElementById('bannerImage');
            
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        loadGameData();
        
        function openRules() {
            const rulesUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbhFuSdU-gISkGnD1PO5RbSKGbvOyTTL88VBfjP2aNmaaGeNbqrNgv0GIvVeqBqwpK_w7pfn1GQa5J/pub?gid=1063342345&single=true&output=csv";
            const rulesContainer = document.getElementById('rules-text');
            
            rulesContainer.innerHTML = "<p style='text-align:center;'>Loading rules...</p>";
            
            Papa.parse(rulesUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    let html = `<h3 style="text-align: center;">How to Play Geo(ff)pardy:</h3>`;
                    
                    results.data.forEach(row => {
                        if (row.RuleText && row.RuleText.trim() !== "") {
                            html += `<p style="font-size: 15px; margin-bottom: 12px;">${row.RuleText}</p>`;
                        }
                    });
                    
                    rulesContainer.innerHTML = html;
                },
                error: function(err) {
                    rulesContainer.innerHTML = "<p style='color:red; text-align:center;'>Error loading rules from Google Sheets.</p>";
                }
            });
            
            document.getElementById('rules-modal').style.display = 'flex';
        }

        function closeRules() {
            document.getElementById('rules-modal').style.display = 'none';
        }

        // PLAYER PANEL COLOR CYCLING
        document.querySelectorAll('.player-panel').forEach(panel => {
            let colorState = 0;
            const glowStates = [
                { dim: "", bright: "", bg: "" },                                       // State 0: Default
                { dim: "#336699", bright: "#5599ff", bg: "rgba(51, 102, 153, 0.15)" }, // State 1: Blue
                { dim: "#990000", bright: "#ff0000", bg: "rgba(255, 0, 0, 0.15)" },    // State 2: Red
                { dim: "#009900", bright: "#00ff00", bg: "rgba(0, 255, 0, 0.15)" }     // State 3: Green
            ];

            panel.addEventListener('click', function(e) {
                if (e.shiftKey) {
                    e.preventDefault();
                    colorState = (colorState + 1) % 4; 
                    
                    if (colorState === 0) {
                        panel.classList.remove("special-space");
                        panel.style.removeProperty("--glow-dim");
                        panel.style.removeProperty("--glow-bright");
                        panel.style.removeProperty("--glow-bg");
                    } else {
                        panel.classList.add("special-space");
                        panel.style.setProperty("--glow-dim", glowStates[colorState].dim);
                        panel.style.setProperty("--glow-bright", glowStates[colorState].bright);
                        panel.style.setProperty("--glow-bg", glowStates[colorState].bg);
                    }
                }
            });

            panel.addEventListener('contextmenu', function(e) {
                if (panel.classList.contains('special-space')) {
                    e.preventDefault();
                    colorState = 0;
                    panel.classList.remove("special-space");
                    panel.style.removeProperty("--glow-dim");
                    panel.style.removeProperty("--glow-bright");
                    panel.style.removeProperty("--glow-bg");
                }
            });
        });
    </script>
    <audio id="alarm-sound-countdown" src="https://geoffhenao.github.io/geoffamania/drowning-panic-theme.mp3"></audio>
    <audio id="alarm-sound-end" src="https://geoffhenao.github.io/geoffamania/ring-loss.mp3"></audio>
