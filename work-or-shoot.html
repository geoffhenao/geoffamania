<style>
    .column-headers {
    display: grid;
    /* Uses the exact same responsive column layout as your game grid */
    grid-template-columns: repeat(7, min(11vw, 13vh));
    gap: 1vh;
    margin-bottom: 0.5vh; /* Small gap between numbers and the top row */
    user-select: none;
}

.column-headers div {
    font-family: monospace !important;
    font-size: 2vh;
    font-weight: bold;
    color: white;
    text-align: center;
    text-shadow: 0 0 8px rgba(85, 153, 255, 0.4);
}
    .fact-check-trackers {
    display: flex;
    gap: 4px;
    align-items: center;
}

.fc-x {
    font-size: 1.8vh;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s ease-in-out;
    padding: 0 2px;
    
    /* Subdued Green Glow Configuration */
    --glow-dim: rgba(0, 153, 0, 0.3);       /* Lowered alpha from 0.6 */
    --glow-bright: rgba(0, 255, 0, 0.5);    /* Lowered alpha from 0.9 */
    --glow-bg: rgba(0, 255, 0, 0);       /* Reduced background bleed */
    animation: neonPulse 2s infinite ease-in-out;
    color: #00cc00;                         /* Slightly deeper green text baseline */
    text-shadow: 0 0 1px rgba(0, 255, 0, 0.2); /* Halved the blur radius and alpha intensity */
}

/* Off State: Dull Grayed-out Disabled state */
.fc-x.disabled {
    animation: none !important;
    color: #444 !important;
    text-shadow: none !important;
    border-color: transparent !important;
    box-shadow: none !important;
}
    #clearBoardBtn {
    margin-top: 2vh;
    background: #222;
    color: #990000;
    border: 2px solid #990000;

    font-family: monospace !important;

    font-weight: bold;

}

#clearBoardBtn:hover {

}

    animation: neonPulse 2s infinite ease-in-out;

}

/* Player A (Blue Glow) matching your colorState 1 */

    --glow-dim: #336699;

}

/* Player B (Red Glow) matching your colorState 2 */

    --glow-dim: #990000;
    --glow-bright: #ff0000;
    --glow-bg: rgba(255, 0, 0, 0.15);
}

    display: none !important;
}

}

/* Perfectly calculated Connect Four Aspect Ratio Constraint */
.grid {
    display: grid;
    grid-template-columns: repeat(7, min(11vw, 13vh));
    grid-template-rows: repeat(6, min(11vw, 13vh));
    gap: 1vh;
}

.panel {
    position: relative;
    width: 100%;

    background: transparent; 
    border: 2px solid #fff;

    cursor: pointer;
}

.panel img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 1;
}

.overlay-text {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 20%; /* Keeps your lower placement footprint intact */
    z-index: 2; /* Forces text to sit on top of the image */
    background: rgba(17, 17, 17, 0.5); /* 50% opacity background */
    border: none;
    outline: none;
    resize: none;
    box-sizing: border-box;
    font-size: 1.1vh; /* Tighter font for the lower height layout */
    font-family: monospace !important; /* Forces monospace styling */
    color: white;
    text-transform: uppercase; /* Forces uppercase layout */
    text-align: center;
    padding: 0 4px;

    /* --- THE UNFAILING CENTER TRICK FOR TEXTAREAS --- */
    line-height: 2.2vh; /* Set this equal to or slightly around your box's calculated height */

}


.label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace !important;
    font-size: 1.4vh;
    color: #666;
    pointer-events: none;
}

/* Directional Arrow Setup */
.directional-arrow {
    position: absolute;
    font-size: 1.5vh;  Responsive font scaling for layout arrows 
    font-weight: bold;
    color: #FFFFFF;
    cursor: pointer;
    pointer-events: auto;
    opacity: 0.3;
    transition: opacity 0.2s, color 0.2s;
    z-index: 6;
}

.directional-arrow.active {
    opacity: 1;
    color: #FF0000;
    text-shadow: 0 0 8px rgba(85, 153, 255, 0.8);
}

@keyframes neonPulse {
    0% {
        box-shadow: 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.6)), inset 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.4));
        border-color: var(--glow-dim, #336699);
    }
    50% {
        box-shadow: 0 0 20px var(--glow-bright, rgba(51, 102, 153, 0.9)), inset 0 0 15px var(--glow-bright, rgba(51, 102, 153, 0.6));
        border-color: var(--glow-bright, #5599ff);
    }
    100% {
        box-shadow: 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.6)), inset 0 0 8px var(--glow-dim, rgba(51, 102, 153, 0.4));
        border-color: var(--glow-dim, #336699);
    }
}

.panel.special-space {

    z-index: 5;
}

#timerDisplay {
    text-shadow: 0 0 10px rgba(85, 153, 255, 0.5);
}

button:hover {
    background: #5599ff;

}

input[type="number"]::-webkit-inner-spin-button {

}

.timer-controls button {

#timerInput::-webkit-outer-spin-button,

    margin: 0;

#timerInput[type="number"] {
    -moz-appearance: textfield;
}

.hidden {
    display: none !important;
}
</style>

<div class="game-container">

        <textarea class="live-text name-field player-glow glow-player-b" rows="1" placeholder="Player"></textarea>

                <div class="fact-check-trackers">
            <span class="fc-x" onclick="toggleFC(this)">X</span>

    <div class="grid-wrap">

        <div>5</div>
        <div>6</div>

    </div>
        <div class="grid" id="grid"></div>
        <button id="clearBoardBtn" onclick="clearFullBoard()">Clear Game Board</button>

<script>
const grid = document.getElementById("grid");

const glowStates = [
    { dim: "", bright: "", bg: "" },                                                
    { dim: "#336699", bright: "#5599ff", bg: "rgba(51, 102, 153, 0.15)" },          
    { dim: "#990000", bright: "#ff0000", bg: "rgba(255, 0, 0, 0.15)" },             
    { dim: "#009900", bright: "#00ff00", bg: "rgba(0, 255, 0, 0.15)" }              
];

// Generate the 7x6 Grid Elements (42 total spaces)
for(let i=0; i<42; i++){
    const arrowContainer = document.createElement("div");
    arrowContainer.className = "arrow-container";

    const directions = [
        { name: 'tl', sym: '↖', r: -1, c: -1, top: '2px', left: '2px' },
        { name: 't',  sym: '↑', r: -1, c:  0, top: '2px', left: '50%', transform: 'translateX(-50%)' },
        { name: 'tr', sym: '↗', r: -1, c:  1, top: '2px', right: '2px' },
        { name: 'l',  sym: '←', r:  0, c: -1, top: '50%', left: '2px', transform: 'translateY(-50%)' },
        { name: 'r',  sym: '→', r:  0, c:  1, top: '50%', right: '2px', transform: 'translateY(-50%)' },
        { name: 'bl', sym: '↙', r:  1, c: -1, bottom: '2px', left: '2px' },
        { name: 'b',  sym: '↓', r:  1, c:  0, bottom: '2px', left: '50%', transform: 'translateX(-50%)' },
        { name: 'br', sym: '↘', r:  1, c:  1, bottom: '2px', right: '2px' }
    ];

    // Fixed math constraints for the updated 7-column layout
    const currentRow = Math.floor(i / 7);
    const currentCol = i % 7;

    directions.forEach(d => {
        const targetRow = currentRow + d.r;
        const targetCol = currentCol + d.c;

        // Validating placement across all 6 rows (0-5) and 7 columns (0-6)
        if (targetRow >= 0 && targetRow <= 5 && targetCol >= 0 && targetCol <= 6) {
            const arrow = document.createElement("div");
            arrow.className = "directional-arrow";
            arrow.innerText = d.sym;
            arrow.style.top = d.top || 'auto';
            arrow.style.bottom = d.bottom || 'auto';
            arrow.style.left = d.left || 'auto';
            arrow.style.right = d.right || 'auto';
            arrow.style.transform = d.transform || 'none';

            arrow.addEventListener("click", e => {
                e.stopPropagation();
                arrow.classList.toggle("active");
            });

            arrowContainer.appendChild(arrow);
        }
    });
    
    const panel = document.createElement("div");
    panel.className = "panel";

    let colorState = 0;

    const label = document.createElement("div");
    label.className = "label";
    //label.innerText = "Add Image"; //

    const img = document.createElement("img");

    const text = document.createElement("textarea");
    text.className = "overlay-text";
    // text.placeholder = "Add text...";//

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.hidden = true;

    function load(file){
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            img.style.display = "block";
            label.style.display = "none";
            panel.dataset.filled = "true";
        }
        reader.readAsDataURL(file);
    }

    panel.addEventListener("dragover", e => e.preventDefault());
    panel.addEventListener("drop", e => {
        e.preventDefault();
        
        const currentRow = Math.floor(i / 7); 
        
        // Block drop if space below is row-valid and empty
        if (currentRow < 5) {
            const panelBelow = grid.children[i + 7];
            if (panelBelow && panelBelow.dataset.filled !== "true") {
                showAlert();
                return;
            }
        }

        load(e.dataTransfer.files[0]);
    });

    panel.addEventListener("click", e => {
        if (e.shiftKey) {
            e.preventDefault();
            e.stopPropagation(); 
            
            colorState = (colorState + 1) % 4;
            
            if (colorState === 0) {
                panel.classList.remove("special-space");
                panel.style.removeProperty("--glow-dim");
                panel.style.removeProperty("--glow-bright");
                panel.style.removeProperty("--glow-bg");
            } else {
                panel.classList.add("special-space");
                panel.style.setProperty("--glow-dim", glowStates[colorState].dim);
                panel.style.setProperty("--glow-bright", glowStates[colorState].bright);
                panel.style.setProperty("--glow-bg", glowStates[colorState].bg);
            }
            return;
        }

        if(e.target === panel || e.target === label || e.target === img){
            const currentRow = Math.floor(i / 7); 
            
            // Connect Four gravity placement logic
            if (currentRow < 5) {
                const panelBelow = grid.children[i + 7];
                if (!panelBelow || panelBelow.dataset.filled !== "true") {
                    showAlert();
                    return; 
                }
            }

            input.click();
        }
    });

    input.addEventListener("change", e => load(e.target.files[0]));
    
    panel.addEventListener("contextmenu", e => {
        e.preventDefault();
        img.src = "";
        img.style.display = "none";
        label.style.display = "flex";
        text.value = "";
        input.value = "";
        panel.classList.remove("special-space"); 
        delete panel.dataset.filled; 
        
        colorState = 0;
        panel.style.removeProperty("--glow-dim");
        panel.style.removeProperty("--glow-bright");
        panel.style.removeProperty("--glow-bg");
    });

    panel.append(label, img, text, input, arrowContainer);
    grid.append(panel);
}

// Sidebar Image Handling Logic
const mediaSlot = document.getElementById("mediaSlot");
const mediaInput = document.getElementById("mediaInput");
const mediaImg = document.getElementById("mediaImg");
const mediaLabel = document.getElementById("mediaLabel");

function loadSidebarFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = event => {
        mediaImg.src = event.target.result;
        mediaImg.style.display = "block";
        mediaLabel.style.display = "none";
    }
    reader.readAsDataURL(file);
}

mediaSlot.addEventListener("click", () => mediaInput.click());
mediaInput.addEventListener("change", e => loadSidebarFile(e.target.files[0]));
mediaSlot.addEventListener("dragover", e => e.preventDefault());
mediaSlot.addEventListener("drop", e => {
    e.preventDefault();
    loadSidebarFile(e.dataTransfer.files[0]);
});
mediaSlot.addEventListener("contextmenu", e => {
    e.preventDefault();
    mediaImg.src = "";
    mediaImg.style.display = "none";
    mediaLabel.style.display = "block";
    mediaInput.value = "";
});

const mediaSlot2 = document.getElementById("mediaSlot2");
const mediaInput2 = document.getElementById("mediaInput2");
const mediaImg2 = document.getElementById("mediaImg2");
const mediaLabel2 = document.getElementById("mediaLabel2");

function loadSidebarFile2(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = event => {
        mediaImg2.src = event.target.result;
        mediaImg2.style.display = "block";
        mediaLabel2.style.display = "none";
    }
    reader.readAsDataURL(file);
}

mediaSlot2.addEventListener("click", () => mediaInput2.click());
mediaInput2.addEventListener("change", e => loadSidebarFile2(e.target.files[0]));
mediaSlot2.addEventListener("dragover", e => e.preventDefault());
mediaSlot2.addEventListener("drop", e => {
    e.preventDefault();
    loadSidebarFile2(e.dataTransfer.files[0]);
});
mediaSlot2.addEventListener("contextmenu", e => {
    e.preventDefault();
    mediaImg2.src = "";
    mediaImg2.style.display = "none";
    mediaLabel2.style.display = "block";
    mediaInput2.value = "";
});

let countdown;
function startTimer() {
    clearInterval(countdown);
    let s = parseInt(document.getElementById("timerInput").value) || 30;
    const display = document.getElementById("timerDisplay");
    countdown = setInterval(() => {
        s--;
        display.innerText = s;
        if(s === 12) document.getElementById("alarm-sound-countdown").play();
        if(s <= 0) { clearInterval(countdown); document.getElementById("alarm-sound-end").play(); }
    }, 1000);
}

function stopTimer() {
    clearInterval(countdown);
    document.getElementById("alarm-sound-countdown").pause();
    document.getElementById("alarm-sound-end").pause();
}

function showAlert() {
    document.getElementById('customAlert').style.display = 'flex';
}

function hideAlert() {
    document.getElementById('customAlert').style.display = 'none';
}
function clearFullBoard() {
    // Confirm box to prevent accidental mid-match wipes
    // if (!confirm("ARE YOU SURE YOU WANT TO CLEAR THE ENTIRE BOARD MATRIX?")) return; //

    // Loop through every single generated panel block on the grid
    Array.from(grid.children).forEach(panel => {
        const img = panel.querySelector("img");
        const label = panel.querySelector(".label");
        const text = panel.querySelector("textarea");
        const input = panel.querySelector("input[type='file']");

        // 1. Wipe out images and reveal default prompt text labels
        if (img) {
            img.src = "";
            img.style.display = "none";
        }
        if (label) {
            label.style.display = "flex";
        }
        if (input) {
            input.value = "";
        }

        // 2. Clear out any custom text overlays typed in
        if (text) {
            text.value = "";
        }

        // 3. Clear the Connect Four data tracker flag
        delete panel.dataset.filled;

        // 4. Strip out any active glow classes or variables
        panel.classList.remove("special-space");
        panel.style.removeProperty("--glow-dim");
        panel.style.removeProperty("--glow-bright");
        panel.style.removeProperty("--glow-bg");
    });
}
