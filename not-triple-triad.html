<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Geoff's Who!</title>
<style>
body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
}
.game-container {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    background: #111;
    padding: 32px;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
/* Left Side Control & Info Panel */
.side-panel {
    width: 250px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.info-box {
    background: #222;
    padding: 16px;
    border-radius: 6px;
    border: 1px solid #444;
}
.info-box h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ffcc00;
}
/* Live-editable text areas for streaming */
.live-text {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid #444;
    color: white;
    padding: 8px;
    box-sizing: border-box;
    font-size: 16px;
    resize: none;
    border-radius: 4px;
}
/* Extra Image Upload Slot */
.media-slot {
    position: relative;
    height: 150px;
    background: #333;
    border: 2px dashed #666;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    cursor: pointer;
    overflow: hidden;
}
.media-slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}
/* Right Side Grid Layout */
.grid-wrap {
    background: #000;
    padding: 24px;
    border-radius: 6px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(3, 200px);
    grid-template-rows: repeat(3, 200px);
    gap: 24px;
}
.panel {
    position: relative;
    width: 200px;
    height: 200px;
    background: #eee;
    border: 4px solid #fff;
    overflow: hidden;
    box-sizing: border-box;
    cursor: pointer;
}
.panel img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 1;
}
.overlay-text {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 48px;
    z-index: 2;
    background: rgba(0,0,0,.55);
    border: none;
    outline: none;
    resize: none;
    padding: 10px;
    box-sizing: border-box;
    font-size: 18px;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    line-height: 1.2;
}
.label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    color: #666;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="game-container">
    <div class="side-panel">
        <div class="info-box">
            <h2>Match Info</h2>
            <textarea class="live-text" rows="2" placeholder="Match Title..."></textarea>
        </div>
        
        <div class="info-box">
            <h2>Scoreboard</h2>
            <textarea class="live-text" rows="1" placeholder="Player 1: 0"></textarea>
            <textarea class="live-text" rows="1" placeholder="Player 2: 0" style="margin-top: 8px;"></textarea>
        </div>

        <div class="info-box">
            <h2>Graphic / Logo</h2>
            <div class="media-slot" id="mediaSlot">
                <span id="mediaLabel">Upload Graphic</span>
                <img id="mediaImg" src="" alt="Custom Graphic">
                <input type="file" id="mediaInput" accept="image/*" hidden>
            </div>
        </div>
    </div>

    <div class="grid-wrap">
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
const grid = document.getElementById("grid");

// Generate the 3x3 Grid Elements
for(let i=0; i<9; i++){
    const panel = document.createElement("div");
    panel.className = "panel";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "Add Image";

    const img = document.createElement("img");

    const text = document.createElement("textarea");
    text.className = "overlay-text";
    text.placeholder = "Wrestler...";

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.hidden = true;

    function load(file){
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            img.style.display = "block";
            label.style.display = "none";
        }
        reader.readAsDataURL(file);
    }

    panel.addEventListener("dragover", e => e.preventDefault());
    panel.addEventListener("drop", e => {
        e.preventDefault();
        load(e.dataTransfer.files[0]);
    });

    panel.addEventListener("click", e => {
        if(e.target === panel || e.target === label || e.target === img){
            input.click();
        }
    });

    input.addEventListener("change", e => load(e.target.files[0]));
    
    // Right-click a wrestler text box to instantly clear it live
    text.addEventListener("contextmenu", e => {
        e.preventDefault();
        text.value = "";
    });

    panel.append(label, img, text, input);
    grid.append(panel);
}

// Logic for the Side Panel Extra Image Upload
const mediaSlot = document.getElementById("mediaSlot");
const mediaInput = document.getElementById("mediaInput");
const mediaImg = document.getElementById("mediaImg");
const mediaLabel = document.getElementById("mediaLabel");

mediaSlot.addEventListener("click", () => mediaInput.click());
mediaInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = event => {
            mediaImg.src = event.target.result;
            mediaImg.style.display = "block";
            mediaLabel.style.display = "none";
        }
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
