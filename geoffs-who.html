<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Geoff's Who!</title>
<style>
body {
    margin: 0;
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
}
.game-container {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    background: #111;
    padding: 32px;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
/* Left Side Control & Info Panel */
.side-panel {
    width: 250px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.info-box {
    background: #222;
    padding: 16px;
    border-radius: 6px;
    border: 1px solid #336699;
}
.info-box h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #336699;
}
/* Live-editable text areas for streaming */
.live-text {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid #222;
    color: white;
    padding: 8px;
    box-sizing: border-box;
    font-size: 16px;
    resize: none;
    border-radius: 4px;
}
/* Side-by-side arrangement for scores */
.score-row {
    display: flex;
    gap: 8px;
    align-items: center;
}
.name-field {
    flex: 1;
}
.score-field {
    width: 50px;
    text-align: center;
    font-weight: bold;
    color: #FFFFFF;
}
/* Extra Image Upload Slot */
.media-slot {
    position: relative;
    height: 300px;
    /* background: #333; */
    /* border: 2px dashed #666; */
    /* border-radius: 6px; */
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000000;
    cursor: pointer;
    overflow: hidden;
}
.media-slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: scale-down;
    display: none;
}
/* Right Side Grid Layout */
.grid-wrap {
    background: #000;
    padding: 24px;
    border-radius: 6px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(6, 200px);
    grid-template-rows: repeat(3, 200px);
    gap: 24px;
}
.panel {
    position: relative;
    width: 200px;
    height: 200px;
    background: #eee;
    border: 4px solid #fff;
    overflow: hidden;
    box-sizing: border-box;
    cursor: pointer;
}
.panel img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 1;
}
.overlay-text {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 48px;
    z-index: 2;
    background: rgba(0,0,0,.55);
    border: none;
    outline: none;
    resize: none;
    padding: 10px;
    box-sizing: border-box;
    font-size: 18px;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    line-height: 1.2;
}
.label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    color: #666;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="game-container">
    <div class="side-panel">
        <div class="info-box">
            <h2 style="text-align: center;">Geoff's Who!</h2>
            <textarea class="live-text" rows="2" placeholder=></textarea>
        </div>
        
        <div class="info-box">
        <h2 style="text-align: center;">Scoreboard</h2>
            <div class="score-row">
                <textarea class="live-text name-field" rows="1" placeholder="Player A"></textarea>
                <textarea class="live-text score-field" rows="1" placeholder="0"></textarea>
            </div>
            <div class="score-row" style="margin-top: 10px;">
                <textarea class="live-text name-field" rows="1" placeholder="Player B"></textarea>
                <textarea class="live-text score-field" rows="1" placeholder="0"></textarea>
            </div>
        </div>

        <div class="info-box">
            <h2 style="text-align: center;">Sponsored by...</h2>
            <div class="media-slot" id="mediaSlot">
                 <span id="mediaLabel"></span> 
                <img id="mediaImg" src="" alt="Custom Graphic">
                <input type="file" id="mediaInput" accept="image/*" hidden>
            </div>
        </div>
    </div>

    <div class="grid-wrap">
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
const grid = document.getElementById("grid");

// Generate the 6x3 Grid Elements
for(let i=0; i<18; i++){
    const panel = document.createElement("div");
    panel.className = "panel";

    const label = document.createElement("div");
    label.className = "label";
     label.innerText = "Add Image";

    const img = document.createElement("img");

    const text = document.createElement("textarea");
    text.className = "overlay-text";
     text.placeholder = "Add text...";

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.hidden = true;

    function load(file){
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            img.style.display = "block";
            label.style.display = "none";
        }
        reader.readAsDataURL(file);
    }

    panel.addEventListener("dragover", e => e.preventDefault());
    panel.addEventListener("drop", e => {
        e.preventDefault();
        load(e.dataTransfer.files[0]);
    });

    panel.addEventListener("click", e => {
        if(e.target === panel || e.target === label || e.target === img){
            input.click();
        }
    });

    input.addEventListener("change", e => load(e.target.files[0]));
    
    // Right-click anywhere on a grid panel to completely wipe it clear live
    panel.addEventListener("contextmenu", e => {
        e.preventDefault();
        img.src = "";
        img.style.display = "none";
        label.style.display = "flex";
        text.value = "";
        input.value = "";
    });

    panel.append(label, img, text, input);
    grid.append(panel);
}

// Logic for the Side Panel Extra Image Upload
const mediaSlot = document.getElementById("mediaSlot");
const mediaInput = document.getElementById("mediaInput");
const mediaImg = document.getElementById("mediaImg");
const mediaLabel = document.getElementById("mediaLabel");

function loadSidebarFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = event => {
        mediaImg.src = event.target.result;
        mediaImg.style.display = "block";
        mediaLabel.style.display = "none";
    }
    reader.readAsDataURL(file);
}

mediaSlot.addEventListener("click", () => mediaInput.click());
mediaInput.addEventListener("change", e => loadSidebarFile(e.target.files[0]));

mediaSlot.addEventListener("dragover", e => e.preventDefault());
mediaSlot.addEventListener("drop", e => {
    e.preventDefault();
    loadSidebarFile(e.dataTransfer.files[0]);
});

// Right-click the sidebar graphic window to instantly clear it live
mediaSlot.addEventListener("contextmenu", e => {
    e.preventDefault();
    mediaImg.src = "";
    mediaImg.style.display = "none";
    mediaLabel.style.display = "block";
    mediaInput.value = "";
});
</script>

</body>
</html>
