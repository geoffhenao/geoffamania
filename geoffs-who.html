<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Geoff's Who!</title>

<style>
    /* Timer Control Adjustments */
#timerDisplay {
    text-shadow: 0 0 10px rgba(85, 153, 255, 0.5);
}
button:hover {
    background: #5599ff;
    transition: background 0.2s;
}
input[type="number"]::-webkit-inner-spin-button {
    opacity: 1;
}

/* Ensure font family uniformity for timer control buttons */
.timer-controls button {
    font-family: monospace !important;
}
  /* For Chrome, Safari, Edge, and Opera */
#timerInput::-webkit-outer-spin-button,
#timerInput::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* For Firefox */
#timerInput[type="number"] {
    -moz-appearance: textfield;
}

    /* Container for the arrows, sits inside each panel */
.arrow-container {
    position: absolute;
    inset: 4px; /* Keeps them tucked inside the border */
    pointer-events: none; /* Allows clicks to pass through to the panel */
    z-index: 5;
}

/* Base style for the small arrows */
.directional-arrow {
    position: absolute;
    font-size: 20px;
    font-weight: bold;
    color: #FFFFFF;
    cursor: pointer;
    pointer-events: auto; /* Re-enables clicking on the arrow itself */
    opacity: 0; /* Subtle by default */
    transition: opacity 0.2s, color 0.2s;
}

/* Active state */
.directional-arrow.active {
    opacity: 1;
    color: #FF0000;
    text-shadow: 0 0 8px rgba(85, 153, 255, 0.8);
}
    @keyframes neonPulse {
    0% {
        box-shadow: 0 0 8px rgba(51, 102, 153, 0.6), inset 0 0 8px rgba(51, 102, 153, 0.4);
        border-color: #336699;
    }
    50% {
        box-shadow: 0 0 20px rgba(51, 102, 153, 0.9), inset 0 0 15px rgba(51, 102, 153, 0.6);
        border-color: #5599ff;
    }
    100% {
        box-shadow: 0 0 8px rgba(51, 102, 153, 0.6), inset 0 0 8px rgba(51, 102, 153, 0.4);
        border-color: #336699;
    }
}

.panel.special-space {
    animation: neonPulse 2s infinite ease-in-out;
    background: rgba(51, 102, 153, 0.15) !important;
    z-index: 5;
}
body {
    margin: 0;
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
}
.game-container {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    background: #111;
    padding: 32px;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
/* Left Side Control & Info Panel - Widened to 300px to accommodate larger assets */
.side-panel {
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.info-box {
    background: #222;
    padding: 16px;
    border-radius: 6px;
    border: 1px solid #336699;
}

/* Box surrounding Event Upload Box */
.info-box2 {
   /* background: #222; */
    padding: 16px;
    border-radius: 0px;
   /* border: 5px solid #000000; */
}
.info-box h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #336699;
}
/* Sponsored Box Cleaned (No border/background) */
.sponsor-box {
    background: transparent;
    padding: 0;
    border: none;
}
.sponsor-box h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #336699;
}
/* Live-editable text areas for streaming */
.live-text {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid #222;
    color: white;
    padding: 8px;
    box-sizing: border-box;
    font-size: 16px;
    resize: none;
    border-radius: 4px;
}
/* Side-by-side arrangement for scores */
.score-row {
    display: flex;
    gap: 8px;
    align-items: center;
}
.name-field {
    flex: 1;
}
.score-field {
    width: 60px;
    text-align: center;
    font-weight: bold;
    color: #FFFFFF;
}
/* Extra Image Upload Slot (Cleaned background & border for transparency) */
.media-slot {
    position: relative;
    width: 100%;
    height: 250px;
    background: transparent;
     border: 2px dashed #336699; 
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #336699;
    cursor: pointer;
    overflow: hidden;
    box-sizing: border-box;
}
/* "Event Logo Upload Space " */
.media-slot2 {
    position: relative;
    width: 100%;
    height: 250px;
    background: transparent;
   /* border: 2px dashed #336699; */
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #336699;
    cursor: pointer;
    overflow: hidden;
    box-sizing: border-box;
}
.media-slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; /* Stretches graphic cleanly into the container constraints */
    display: none;
}

/* Right Side Grid Layout - Updated to 250px sizes */
.grid-wrap {
    background: #000;
    padding: 24px;
    border-radius: 6px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(7, 250px);
    grid-template-rows: repeat(3, 250px);
    gap: 24px;
}
.panel {
    position: relative;
    width: 250px;
    height: 250px;
    background: transparent; /* Seamless transparent background for PNGs */
    border: 4px solid #fff;
    overflow: hidden;
    box-sizing: border-box;
    cursor: pointer;
}
.panel img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
    z-index: 1;
}
.overlay-text {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 48px;
    z-index: 2;
    background: rgba(128,128,128,0.75);
    border: none;
    outline: none;
    resize: none;
    padding: 10px;
    box-sizing: border-box;
    font-size: 18px;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    line-height: 1.2;
}
.label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    color: #666;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="game-container">
    <div class="side-panel">

        <div class="info-box2">
    <h2 style="text-align: center;"></h2>
    <div class="media-slot2" id="mediaSlot2">
        <span id="mediaLabel2">Upload Logo</span> 
        <img id="mediaImg2" src="" alt="Event Graphic" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; display: none;">
        <input type="file" id="mediaInput2" accept="image/*" hidden>
    </div>
</div>

<div class="info-box">
    <h2>Timer</h2>
    <div id="timerDisplay" style="font-size: 40px; text-align: center; color: #5599ff; font-weight: bold; margin: 10px 0; font-family: monospace;">0</div>
    <div class="timer-controls" style="display: flex; gap: 5px;">
        <input type="number" id="timerInput" value="30" min="1" max="60" style="background: #000; color: white; border: 1px solid #336699; width: 60px; padding: 5px; text-align: center; font-size: 1rem; font-family: monospace;">
        <button onclick="startTimer()" style="background: #336699; color: white; border: none; padding: 5px 10px; cursor: pointer; font-family: monospace; width: 80px;">START</button>
        <button onclick="stopTimer()" style="background: #336699; color: white; border: none; padding: 5px 10px; cursor: pointer; font-family: monospace; width: 80px;">STOP</button>
    </div>
</div>
        <div class="info-box">
            <h2 style="text-align: center;">Contestants</h2>
            <div class="score-row">
                <textarea class="live-text name-field" rows="1" placeholder="Player A"></textarea>
                <textarea class="live-text score-field" rows="1" placeholder="0"></textarea>
            </div>
            <div class="score-row" style="margin-top: 10px;">
                <textarea class="live-text name-field" rows="1" placeholder="Player B"></textarea>
                <textarea class="live-text score-field" rows="1" placeholder="0"></textarea>
            </div>
        </div>

        <div class="sponsor-box">
            <h2 style="text-align: center;">Sponsored by...</h2>
            <div class="media-slot" id="mediaSlot">
                <span id="mediaLabel">Upload Logo</span> 
                <img id="mediaImg" src="" alt="Custom Graphic">
                <input type="file" id="mediaInput" accept="image/*" hidden>
            </div>
        </div>
    </div>


    <div class="grid-wrap">
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
const grid = document.getElementById("grid");

// Generate the 7x3 Grid Elements
for(let i=0; i<21; i++){
    // --- DIRECTIONAL ARROW GENERATOR ---
    const arrowContainer = document.createElement("div");
    arrowContainer.className = "arrow-container";

    const directions = [
        { name: 'tl', sym: '↖', r: -1, c: -1, top: '2px', left: '2px' },
        { name: 't',  sym: '↑', r: -1, c:  0, top: '2px', left: '50%', transform: 'translateX(-50%)' },
        { name: 'tr', sym: '↗', r: -1, c:  1, top: '2px', right: '2px' },
        { name: 'l',  sym: '←', r:  0, c: -1, top: '50%', left: '2px', transform: 'translateY(-50%)' },
        { name: 'r',  sym: '→', r:  0, c:  1, top: '50%', right: '2px', transform: 'translateY(-50%)' },
        { name: 'bl', sym: '↙', r:  1, c: -1, bottom: '2px', left: '2px' },
        { name: 'b',  sym: '↓', r:  1, c:  0, bottom: '2px', left: '50%', transform: 'translateX(-50%)' },
        { name: 'br', sym: '↘', r:  1, c:  1, bottom: '2px', right: '2px' }
    ];

    const currentRow = Math.floor(i / 3);
    const currentCol = i % 3;

    directions.forEach(d => {
        const targetRow = currentRow + d.r;
        const targetCol = currentCol + d.c;

        // Only create the arrow if the target space is on the board
        if (targetRow >= 0 && targetRow <= 2 && targetCol >= 0 && targetCol <= 2) {
            const arrow = document.createElement("div");
            arrow.className = "directional-arrow";
            arrow.innerText = d.sym;
            arrow.style.top = d.top || 'auto';
            arrow.style.bottom = d.bottom || 'auto';
            arrow.style.left = d.left || 'auto';
            arrow.style.right = d.right || 'auto';
            arrow.style.transform = d.transform || 'none';

            arrow.addEventListener("click", e => {
                e.stopPropagation();
                arrow.classList.toggle("active");
            });

            arrowContainer.appendChild(arrow);
        }
    });
    const panel = document.createElement("div");
    panel.className = "panel";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "Add Image";

    const img = document.createElement("img");

    const text = document.createElement("textarea");
    text.className = "overlay-text";
    text.placeholder = "Add text...";

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.hidden = true;

    function load(file){
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            img.style.display = "block";
            label.style.display = "none";
        }
        reader.readAsDataURL(file);
    }

    panel.addEventListener("dragover", e => e.preventDefault());
    panel.addEventListener("drop", e => {
        e.preventDefault();
        load(e.dataTransfer.files[0]);
    });

panel.addEventListener("click", e => {
        if (e.shiftKey) {
            e.preventDefault();
            e.stopPropagation(); // Stops the file dialog box from opening
            panel.classList.toggle("special-space");
            return;
        }

        if(e.target === panel || e.target === label || e.target === img){
            input.click();
        }
    });

    input.addEventListener("change", e => load(e.target.files[0]));
    
    // Right-click anywhere on a grid panel to completely wipe it clear live
    panel.addEventListener("contextmenu", e => {
        e.preventDefault();
        img.src = "";
        img.style.display = "none";
        label.style.display = "flex";
        text.value = "";
        input.value = "";
        panel.classList.remove("special-space"); // Clears the neon pulse effect
    });

    panel.append(label, img, text, input, arrowContainer);
    grid.append(panel);
}

// Logic for the Side Panel Extra Image Upload
const mediaSlot = document.getElementById("mediaSlot");
const mediaInput = document.getElementById("mediaInput");
const mediaImg = document.getElementById("mediaImg");
const mediaLabel = document.getElementById("mediaLabel");

function loadSidebarFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = event => {
        mediaImg.src = event.target.result;
        mediaImg.style.display = "block";
        mediaLabel.style.display = "none";
    }
    reader.readAsDataURL(file);
}

mediaSlot.addEventListener("click", () => mediaInput.click());
mediaInput.addEventListener("change", e => loadSidebarFile(e.target.files[0]));

mediaSlot.addEventListener("dragover", e => e.preventDefault());
mediaSlot.addEventListener("drop", e => {
    e.preventDefault();
    loadSidebarFile(e.dataTransfer.files[0]);
});

// Right-click the sidebar graphic window to instantly clear it live
mediaSlot.addEventListener("contextmenu", e => {
    e.preventDefault();
    mediaImg.src = "";
    mediaImg.style.display = "none";
    mediaLabel.style.display = "block";
    mediaInput.value = "";
});

const mediaSlot2 = document.getElementById("mediaSlot2");
const mediaInput2 = document.getElementById("mediaInput2");
const mediaImg2 = document.getElementById("mediaImg2");
const mediaLabel2 = document.getElementById("mediaLabel2");

function loadSidebarFile2(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = event => {
        mediaImg2.src = event.target.result;
        mediaImg2.style.display = "block";
        mediaLabel2.style.display = "none";
    }
    reader.readAsDataURL(file);
}

mediaSlot2.addEventListener("click", () => mediaInput2.click());
mediaInput2.addEventListener("change", e => loadSidebarFile2(e.target.files[0]));
mediaSlot2.addEventListener("dragover", e => e.preventDefault());
mediaSlot2.addEventListener("drop", e => {
    e.preventDefault();
    loadSidebarFile2(e.dataTransfer.files[0]);
});
mediaSlot2.addEventListener("contextmenu", e => {
    e.preventDefault();
    mediaImg2.src = "";
    mediaImg2.style.display = "none";
    mediaLabel2.style.display = "block";
    mediaInput2.value = "";
});

let countdown;
function startTimer() {
    clearInterval(countdown);
    let s = parseInt(document.getElementById("timerInput").value) || 30;
    const display = document.getElementById("timerDisplay");
    countdown = setInterval(() => {
        s--;
        display.innerText = s;
        if(s === 12) document.getElementById("alarm-sound-countdown").play();
        if(s <= 0) { clearInterval(countdown); document.getElementById("alarm-sound-end").play(); }
    }, 1000);
}

function stopTimer() {
    clearInterval(countdown);
    document.getElementById("alarm-sound-countdown").pause();
    document.getElementById("alarm-sound-end").pause();
}
</script>

<audio id="alarm-sound-countdown" src="https://geoffhenao.github.io/geoffamania/drowning-panic-theme.mp3"></audio>
<audio id="alarm-sound-end" src="https://geoffhenao.github.io/geoffamania/ring-loss.mp3"></audio>

</body>
</html>
